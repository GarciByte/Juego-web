<div class="game-container">

  <div class="header">

    <!-- Información del oponente -->
    <div class="opponent-info" *ngIf="opponent">
      <span class="opponent-label">Oponente: </span>
      <img [src]="opponent.avatar.url" alt="Avatar del oponente" />
      <span>{{ opponent.nickname }}</span>
    </div>

    <!-- Información del turno y temporizador -->
    <div class="turn-info">
      <div class="turn-timer">
        <span>{{ formatTime(turnTimer) }}</span>
      </div>
      <div class="turn-message">
        <p *ngIf="currentTurnUserId === user.userId && !gameFinished">¡Es tu turno!</p>
        <p *ngIf="currentTurnUserId !== user.userId && !gameFinished">Esperando turno...</p>
        <p *ngIf="gameFinished">Esperando a que el oponente acepte la revancha...</p>
      </div>
    </div>

    <!-- Botón para abandonar partida -->
    <div class="leave-game-header">
      <button (click)="leaveGame()">Abandonar Partida</button>
    </div>

  </div>

  <div class="main-game-area">

    <!-- Tablero -->
    <div class="board-container">
      <div class="card" *ngFor="let card of board" (click)="onCardClick(card)">
        <img *ngIf="card.Value !== null" [src]="getCardImage(card.Value)" alt="Carta" />
        <img *ngIf="card.Value === null" src="game/0.png" alt="Carta sin descubrir" />
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-container">

      <div class="chat-messages">
        <div class="chat-message" *ngFor="let msg of chatMessages">
          <span>{{ msg }}</span>
        </div>
      </div>

      <div class="chat-input-container">
        <input type="text" [(ngModel)]="chatInput" placeholder="Escribe tu mensaje" />
        <button (click)="sendChat()">Enviar</button>
      </div>
      
    </div>

  </div>

</div>
